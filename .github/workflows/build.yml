name: Build Executables

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            separator: ":"
            binary_name: SalesforceDeployer
          - os: windows-latest
            separator: ";"
            binary_name: SalesforceDeployer.exe
          - os: macos-latest
            separator: ":"
            binary_name: SalesforceDeployer

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # caching pip dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller uvicorn fastapi httpx pydantic

    - name: Build with PyInstaller
      run: |
        pyinstaller --name "SalesforceDeployer" --add-data "static${{ matrix.separator }}static" --clean -y --onefile server.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SalesforceDeployer-${{ matrix.os }}
        path: dist/${{ matrix.binary_name }}
